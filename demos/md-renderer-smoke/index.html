<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Markdown renderer smoke test</title>
  <link rel="preload" href="../../fonts/commissioner/Commissioner-Latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../../vars.css">
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div class="app" data-view="doc">

    <aside class="sidebar" aria-label="Navigation">
      <div class="sidebar__header t-title">Renderer</div>

      <nav class="sidebar__nav" id="toc">
        <span class="toc__indicator" aria-hidden="true"></span>
      </nav>

      <footer class="sidebar__footer t-caption">
        md.js renderer
      </footer>
    </aside>

    <main class="book" id="doc">
      <!--
        Local serve: browsers block fetch() of file://. From the repo root:
          python3 -m http.server 8765
        Then open http://localhost:8765/demos/md-renderer-smoke/

        Offset is explicit 0 so each article renders its own markdown
        hierarchy starting at h1/t-hero. The shell carries no page h1 or
        part label; three article h1s coexist on this internal test page.
      -->

      <article class="book__section" id="sample-a" data-md-src="./sample-a.md" data-md-heading-offset="0"></article>
      <article class="book__section" id="sample-b" data-md-src="./sample-b.md" data-md-heading-offset="0"></article>
      <article class="book__section" id="sample-c" data-md-src="./sample-c.md" data-md-heading-offset="0"></article>
    </main>

    <aside class="inspector" aria-label="Inspector">
      <section class="inspector__group">
        <header class="card card--heading">
          <h2 class="t-display">Notes</h2>
        </header>
        <div class="card">
          <div class="card__heading">
            <h3 class="t-title">Renderer is dumb</h3>
            <p class="t-caption">The <code class="t-code">book__section</code> wrapper lives in the shell, not the renderer. Each article is one markdown file.</p>
          </div>
        </div>
        <div class="card">
          <div class="card__heading">
            <h3 class="t-title">Watch for errors</h3>
            <p class="t-caption">Open devtools. <code class="t-code">kk:md-rendered</code> fires once per article. Zero errors.</p>
          </div>
        </div>
      </section>
    </aside>

  </div>

  <script src="../../js/kit.js" defer></script>
  <script src="../../js/md.js" defer></script>
  <script>
    document.addEventListener('kk:md-rendered', function () {
      console.log('[smoke] kk:md-rendered fired; articles:',
        document.querySelectorAll('[data-md-src]').length);
    });
  </script>
</body>
</html>
