<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kit snapshot — every component</title>
  <link rel="preload" href="../../fonts/commissioner/Commissioner-Latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../../vars.css">
  <link rel="stylesheet" href="../../style.css">
  <script type="importmap">
    { "imports": { "vue": "../../packages/vue/node_modules/vue/dist/vue.esm-browser.prod.js" } }
  </script>
</head>
<body>
  <div id="app"></div>
  <!-- behavior layer: defines window.KK, auto-inits on DOMContentLoaded -->
  <script src="../../js/kit.js"></script>
  <script type="module">
    import { createApp } from 'vue'
    import App from './index.vue.js'
    const host = document.createElement('div')
    createApp(App).mount(host)
    document.getElementById('app').replaceWith(...host.children)
    // The DOM is now static in the page. Bind kit.js behavior against it.
    // Idempotent with the DOMContentLoaded auto-init that follows.
    if (window.KK) window.KK.init()
  </script>
</body>
</html>
