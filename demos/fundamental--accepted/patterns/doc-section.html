<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preload" href="../../../fonts/commissioner/Commissioner-Latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../../../vars.css" />
  <link rel="stylesheet" href="../../../style.css" />
  <title>Doc section</title>
  <style>
    body { margin: 0; padding: var(--space-6); background: var(--color-bg); }
  </style>
</head>
<body>
  <article class="doc__section">
    <h2 class="t-display">
      Buttons<br />
      <span class="t-display--medium t-muted">Secondary, primary</span>
    </h2>
    <p class="t-body">
      Full-width by default, <span class="t-mono">12px</span>
      radius, bold label. Imperative verbs. One primary per card.
    </p>
    <div class="card">
      <p class="t-caption">Pick a theme for the next document pass.</p>
      <button class="button t-subtitle">Pick tokens</button>
      <button class="button button--primary t-subtitle">Apply tokens</button>
    </div>
  </article>
</body>
</html>
