<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preload" href="../../../fonts/commissioner/Commissioner-Latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../../../vars.css" />
  <link rel="stylesheet" href="../../../style.css" />
  <title>Inspector group</title>
  <style>
    body { margin: 0; padding: var(--space-6); background: var(--color-bg); }
    .wrap { max-width: 420px; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="inspector__group">
      <header class="card card--heading">
        <h2 class="t-display">Tweak</h2>
      </header>

      <div class="card card--interactive" data-state="active">
        <div class="card__heading">
          <h3 class="t-title">Tweak the tokens</h3>
          <p class="t-caption">Brief the agent, pick a direction, scope, commit.</p>
        </div>
        <div class="card__collapsible">
          <div class="card__collapsible-inner">
            <label class="switch t-caption">
              <input type="checkbox" class="switch__input" checked />
              <span class="switch__track"></span>
              Color tokens
            </label>
            <label class="switch t-caption">
              <input type="checkbox" class="switch__input" />
              <span class="switch__track"></span>
              Type tokens
            </label>
            <label class="field field--row">
              <span class="t-caption--bold field__label">Version</span>
              <input class="t-caption field__input" type="text" value="v1.2.0" />
            </label>
          </div>
        </div>
        <button class="button t-subtitle" data-cta="minimized">Configure</button>
        <button class="button button--primary t-subtitle" data-cta="active">Apply tweak</button>
      </div>

      <div class="card card--interactive">
        <div class="card__heading">
          <h3 class="t-title">Templates</h3>
          <p class="t-caption">Saved configurations from earlier tweaks.</p>
        </div>
        <div class="card__collapsible">
          <div class="card__collapsible-inner">
            <label class="field field--row">
              <span class="t-caption--bold field__label">Memo</span>
              <span class="t-caption field__value">monochrome, bold</span>
            </label>
            <label class="field field--row">
              <span class="t-caption--bold field__label">Call</span>
              <span class="t-caption field__value">muted warm, balanced</span>
            </label>
          </div>
        </div>
        <button class="button t-subtitle" data-cta="minimized">Browse</button>
        <button class="button button--primary t-subtitle" data-cta="active">Apply template</button>
      </div>
    </section>
  </div>
  <script src="../../../js/kit.js" defer></script>
</body>
</html>
