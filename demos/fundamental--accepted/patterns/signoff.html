<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preload" href="../../../fonts/commissioner/Commissioner-Latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../../../vars.css" />
  <link rel="stylesheet" href="../../../style.css" />
  <title>Signoff</title>
  <style>
    body { margin: 0; padding: var(--space-6); background: var(--color-bg); }
  </style>
</head>
<body>
  <div class="doc__signoff">
    <div class="doc__signoff-stats">
      <div class="stat t-caption">
        <div><span class="t-caption--bold">9</span> components in the kit.</div>
        <div><span class="t-caption--bold">9</span> color tokens, and not one more.</div>
      </div>
      <div class="stat t-caption">
        <div><span class="t-caption--bold">12</span> spacing tokens on a 4px grid.</div>
        <div><span class="t-caption--bold">7</span> type sizes, three weights.</div>
      </div>
    </div>
    <div class="doc__signoff-signature">
      <p class="t-caption">
        Signed by
        <span class="t-caption--bold">Konstantin Konstantinopolskii,<br /></span>
        founder at
        <span class="t-caption--bold">kk.consulting<br /></span>
        <span class="t-muted">23 April '26 at 17:30 Tbilisi Time.</span>
      </p>
      <img class="doc__signoff-signature-img" src="../../../signature.svg" alt="Handwritten signature of Konstantin Konstantinopolskii" />
    </div>
  </div>
</body>
</html>
