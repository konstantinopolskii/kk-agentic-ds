name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.7.1). Leave blank to use the current ref.'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@konstantinopolskii'

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

  notify-consumers:
    needs: publish
    runs-on: ubuntu-latest
    env:
      DISPATCH_TOKEN: ${{ secrets.CONSUMER_DISPATCH_TOKEN }}
    steps:
      - name: Dispatch update to Wealthy
        if: env.DISPATCH_TOKEN != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.DISPATCH_TOKEN }}
          repository: kk-consulting/wealthy
          event-type: kk-design-system-updated
          client-payload: |
            {
              "version": "${{ github.event.inputs.tag || github.ref_name }}",
              "changelog_url": "https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.tag || github.ref_name }}"
            }
