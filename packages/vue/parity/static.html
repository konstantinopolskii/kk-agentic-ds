<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parity golden — canonical markup</title>
  <link rel="preload" href="../../../fonts/commissioner/Commissioner-Latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../../../vars.css">
  <link rel="stylesheet" href="../../../style.css">
</head>
<body>
  <main class="book">
    <article class="book__section">
      <h2 class="t-display">Parity</h2>
      <div class="book__example book__example--row">
        <button class="button t-subtitle" type="button">Browse patterns</button>
        <button class="button button--primary t-subtitle" type="button">Commit the choice</button>
      </div>
      <div class="chip-wrap">
        <button class="chip" type="button" aria-pressed="true">Founder</button>
        <button class="chip" type="button" aria-pressed="false">Strategist</button>
        <button class="chip" type="button" aria-pressed="false">Mentor</button>
      </div>
      <div class="book__example book__example--row">
        <span class="tag">Foundations</span>
        <span class="tag">9 components</span>
        <span class="tag tag--bold">Signed</span>
      </div>
      <div class="metric-row">
        <div class="metric">
          <p class="metric__value">30K</p>
          <p class="metric__label">Users monthly</p>
          <p class="metric__delta">▲ 100%</p>
        </div>
        <div class="metric">
          <p class="metric__value">5K</p>
          <p class="metric__label">Users daily</p>
        </div>
        <div class="metric">
          <p class="metric__value">4.7</p>
          <p class="metric__label">From 1 000+ reviews</p>
        </div>
      </div>
      <div class="book__example book__example--row">
        <span class="spark" role="img" aria-label="Position, 8 weeks, rising">
          <span class="spark__bar" style="--v: 30%"></span>
          <span class="spark__bar" style="--v: 36%"></span>
          <span class="spark__bar" style="--v: 42%"></span>
          <span class="spark__bar" style="--v: 50%"></span>
          <span class="spark__bar" style="--v: 58%"></span>
          <span class="spark__bar" style="--v: 66%"></span>
          <span class="spark__bar" style="--v: 75%"></span>
          <span class="spark__bar" style="--v: 85%"></span>
        </span>
      </div>
      <div class="spark spark--panel" role="img" aria-label="Traffic, 12 months, actuals soft, forecast ink">
        <span class="spark__bar spark__bar--soft" style="--v: 44%"></span>
        <span class="spark__bar spark__bar--soft" style="--v: 48%"></span>
        <span class="spark__bar" style="--v: 45%"></span>
        <span class="spark__bar" style="--v: 52%"></span>
        <span class="spark__bar" style="--v: 49%"></span>
        <span class="spark__bar" style="--v: 56%"></span>
        <span class="spark__bar" style="--v: 53%"></span>
        <span class="spark__bar" style="--v: 60%"></span>
        <span class="spark__bar" style="--v: 58%"></span>
        <span class="spark__bar" style="--v: 66%"></span>
        <span class="spark__bar" style="--v: 74%"></span>
        <span class="spark__bar" style="--v: 82%"></span>
      </div>
    </article>
  </main>
</body>
</html>
